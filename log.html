<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      .container{
        margin-left: 400px;
        margin-top: 150px;
        width: 400px;
        background: #e1e1e1;
        padding: 20px;
      }
      .form1{
        padding-top: 20px;
        padding-bottom: 20px;
        overflow: hidden;
      }
      .item1{
        width: 100%;
        margin-top: 30px;
        margin-bottom: 30px;
        overflow:hidden;
      }
      .item1 label{
        text-align: right;
        float: left;
        width: 20%;
      }
      .item1 input{
        float: right;
        width: 75%;
      }
      .item2{
        width: 100%;
        margin-top: 30px;
        margin-bottom: 30px;
      }
      .item2 input{
        width: 18%;
        margin-right: 30px;
        float: left;
      }
      .item2 img{
        width:40%;
      }
      .item3{
        margin:0;
        overflow: hidden;
      }
      .item3 ul{
        margin: 0;
        padding: 0;
        list-style-type: none;
        float:right;
      }
      .item3 li{
        display: inline;
      }
      .button1{
        background-color: #e1e1e1;
        border: 0.5px solid;
        width:70px;
      }
      .button2{
        background-color: #00c4ff;
        border: 0.5px solid;
        width:70px;
      }
      .button1:hover{
        background: #c3c3c3;
      }
      .button2:hover{
        background: #00c4ff78;
      }
      .bye a{
        width: 100px;
        height: 100px;
        border: 1px solid white;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form class="form1" action="index.html" method="post">
        <div class="item1">
          <label for="name">用户名: </label>
          <input type="text" name="name" value="" placeholder="键入您的用户名">
        </div>
        <div class="item1">
          <label for="pw">密码: </label>
          <input type="text" name="pw" value="">
        </div>
        <div class="item2">
          <input type="text" name="" value="">
          <img src="images/e1.jpg" alt="" height="30px">
        </div>
        <div class="item3">
          <ul>
            <li><button class="button1" type="button" name="button" onclick="location.href='index.html';">取消</button></li>
            <li><button class="button2" type="button" name="button" onclick="alert('login successful'); location.href='index2.html';"/>登录</button></li>
          </ul>
        </div>
      </form>
    </div>

    <div class="bye">
      <a href="index.html">aaaaa</a>
    </div>
  </body>
</html>
