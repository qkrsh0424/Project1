<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      .container{
        margin-left: 250px;
        margin-top: 100px;
        width: 700px;
        background: #e1e1e1;
        padding: 20px;
      }
      .form1{
        padding-right: 200px;
        padding-top: 20px;
        padding-bottom: 20px;
        overflow: hidden;
      }
      .item1{
        width: 100%;
        margin-top: 30px;
        margin-bottom: 30px;
        overflow:hidden;
      }
      .item1 label{
        text-align: right;
        float: left;
        width: 20%;
      }
      .item1 input{
        float: right;
        width: 70%;
      }
      .item2{
        width: 100%;
        margin-top: 30px;
        margin-bottom: 30px;
      }
      .item2 input{
        width: 20%;
        margin-right: 40px;
        float: left;
      }
      .item2 img{
        width:40%;
      }
      .item3{
        margin:0;
        overflow: hidden;
      }
      .item3 ul{
        margin: 0;
        padding: 0;
        list-style-type: none;
        float:right;
      }
      .item3 li{
        display: inline;
      }
      .button1{
        background-color: #e1e1e1;
        border: 0.5px solid;
        width:70px;
      }
      .button2{
        background-color: #00c4ff;
        border: 0.5px solid;
        width:70px;
      }
      .button2:hover{
        background: #00b4ea;
      }
      .bye a{
        width: 100px;
        height: 100px;
        border: 1px solid white;
        color: white;
      }
    </style>

  </head>
  <body>
    <div class="container">
      <form class="form1" action="index.html" method="post">
        <div class="item1">
          <label for="name">昵称: </label>
          <input type="text" name="name" value="" placeholder="昵称">
        </div>
        <div class="item1">
          <label for="pw">密码: </label>
          <input type="text" name="pw" value="" placeholder="密码">
        </div>
        <div class="item1">
          <label for="pw">确认密码: </label>
          <input type="text" name="pw" value="" placeholder="确认密码">
        </div>
        <div class="item1">
          <label for="pw">邮箱: </label>
          <input type="text" name="pw" value="" placeholder="邮箱">
        </div>
        <div class="item1">
          <label for="pw">电话: </label>
          <input type="text" name="pw" value="" placeholder="电话">
        </div>
        <div class="item1">
          <label for="pw">地址: </label>
          <input type="text" name="pw" value="" placeholder="地址">
        </div>
        <div class="item3">
          <ul>
            <li><button class="button2" type="button" name="button" onclick="alert('successful'); location='index.html';">注册</button></li>
          </ul>
        </div>
      </form>
    </div>
    <div class="bye">
      <a href="index.html">aaaaaaaaaaaaa</a>
    </div>
  </body>
</html>
